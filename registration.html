<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="brand">MyApp</div>
      <p class="subtitle">Create your account</p>

      <form class="auth-form" onsubmit="return registerUser()">
        <div class="field">
          <input type="text" id="regName" placeholder="Full Name" required />
        </div>

        <div class="field">
          <input type="email" id="regEmail" placeholder="Email" required />
        </div>

        <div class="field">
          <input type="password" id="regPassword" placeholder="Password" required />
        </div>

        <div class="field">
          <input type="password" id="regConfirm" placeholder="Confirm Password" required />
        </div>

        <button class="auth-btn" type="submit">Sign Up</button>

        <p class="terms">
          By signing up, you agree to our <a href="#">Terms</a> & <a href="#">Privacy</a>.
        </p>
      </form>
    </div>

    <div class="auth-card small">
      <p class="switch">
        Already have an account?
        <a href="login.html">Log in</a>
      </p>
    </div>

    <p class="mini-note">Demo UI only (no backend)</p>
  </div>

  <script>
    function registerUser() {
      // Demo registration only
      alert("Registration successful! Please login.");
      window.location.href = "login.html";
      return false;
    }
  </script>

</body>
</html>
