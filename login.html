<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="brand">MyApp</div>
      <p class="subtitle">Sign in to continue</p>

      <form class="auth-form" onsubmit="return loginUser()">
        <div class="field">
          <input type="email" id="loginEmail" placeholder="Email" required />
        </div>

        <div class="field">
          <input type="password" id="loginPassword" placeholder="Password" required />
        </div>

        <button class="auth-btn" type="submit">Log In</button>

        <div class="divider"><span>OR</span></div>
        <button class="auth-btn outline" type="button">Continue with Google</button>
      </form>
    </div>

    <div class="auth-card small">
      <p class="switch">
        Don’t have an account?
        <a href="registration.html">Sign up</a>
      </p>
    </div>

    <p class="mini-note">Demo UI only (no backend)</p>
  </div>

  <script>
    function loginUser() {
      // Demo login (no backend)
      localStorage.setItem("isLoggedIn", "true");
      window.location.href = "index.html";
      return false;
    }
  </script>

</body>
</html>
