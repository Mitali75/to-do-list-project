<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#0095f6;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

a{
color:#0095f6;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form onsubmit="return loginUser()">

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account?</p>

<a href="registration.html">Register</a>

</div>

<script>

function loginUser(){

alert("Login Successful!");

window.location.href="index.html";

return false;

}

</script>

</body>
</html>
